<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - IKEA</title>
  <link rel="icon" href="/public/images/fav/favicon.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
  <!-- Font Awesome CDN -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <!-- AOS Library -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ikea-blue: #004F9E;
      --ikea-yellow: #FFDB00;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #f8f9fa;
    }

    h2, h4 { font-family: 'Poppins', Arial, sans-serif; }

    .navbar {
      background-color: #004F9E;
    }
    .navbar .nav-link {
      position: relative;
      transition: opacity 0.2s ease;
    }
    .navbar .nav-link::after {
      content: '';
      position: absolute;
      left: 0; bottom: -4px;
      width: 0%; height: 2px;
      background: var(--ikea-yellow);
      transition: width 0.25s ease;
    }
    .navbar .nav-link:hover::after { width: 100%; }
    .navbar .btn-outline-light {
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }
    .navbar .btn-outline-light:hover {
      transform: translateY(-2px);
      background: var(--ikea-yellow);
      border-color: var(--ikea-yellow);
      color: var(--ikea-blue);
      font-weight: 600;
    }

    h2 {
      font-size: 2.5rem;
      color: #004F9E;
      font-weight: 700;
    }
    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background: var(--ikea-yellow);
      margin: 0.6rem auto 0;
      border-radius: 2px;
    }

    h4 {
      font-size: 1.25rem;
    }

    .contact-info {
      background: #fff;
      border-radius: 14px;
      padding: 2rem 1.8rem;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
      height: 100%;
    }
    .contact-info .info-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.6rem;
      transition: transform 0.25s ease;
    }
    .contact-info .info-row:hover { transform: translateX(6px); }
    .contact-info .info-row:last-child { margin-bottom: 0; }
    .contact-info i {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--ikea-blue);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem;
      flex-shrink: 0;
      margin-right: 0;
    }

    .contact-form-card {
      background: #fff;
      border-radius: 14px;
      padding: 2rem 1.8rem;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }

    .form-control {
      border: none;
      border-bottom: 2px solid #dfe3e8;
      border-radius: 0;
      padding: 0.6rem 0.2rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .form-control:focus {
      border-color: var(--ikea-blue);
      box-shadow: none;
    }

    .btn-primary {
      background-color: var(--ikea-yellow);
      border-color: var(--ikea-yellow);
      color: var(--ikea-blue);
      font-weight: 700;
      border-radius: 30px;
      padding: 0.65rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover {
      background-color: var(--ikea-yellow);
      border-color: var(--ikea-yellow);
      color: var(--ikea-blue);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255,219,0,0.4);
    }

    .message-container {
      display: none;
      background-color: #d4edda;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(-8px);
      animation: msgIn 0.4s ease-out forwards;
    }
    @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }

    .footer {
      background-color: white;
      color: black;
      padding: 20px 0;
      text-align: center;
      border-top: 1px solid #ddd;
    }
    .footer .social-icons { margin-top: 10px; }
    .footer .icons1 {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      color: black;
      font-size: 20px;
      margin: 0 6px;
      border-radius: 50%;
      background: #f8f9fa;
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
    }
    .footer .icons1:hover {
      background: var(--ikea-yellow);
      color: var(--ikea-blue);
      transform: translateY(-4px) rotate(-6deg);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark" style="background-color: #004F9E;">
    <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-white" href="/">
      <img src="/public/images/ikea.png" alt="IKEA Logo" height="40" class="me-2">
    </a>
    <div class="d-flex align-items-center">
      <a href="/" class="nav-link text-white me-3">Home</a>
      <a href="/about" class="nav-link text-white me-3">About Us</a>
      <a href="/contact" class="nav-link text-white me-3">Contact Us</a>
      <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
      <a href="/register" class="btn btn-outline-light btn-sm">Register</a>
    </div>
  </nav>

  <!-- Contact Us Content -->
  <div class="container mt-5">
    <h2 class="fw-bold text-center mb-4" data-aos="fade-up">Contact Us</h2><br>
    <div class="row g-4">
      <!-- Contact Info -->
      <div class="col-md-6" data-aos="fade-right">
        <div class="contact-info">
          <div class="info-row">
            <i class="fas fa-map-marker-alt"></i>
            <div><strong>Our Location</strong><br>123 IKEA Street, City, Country</div>
          </div>
          <div class="info-row">
            <i class="fas fa-phone-alt"></i>
            <div><strong>Phone</strong><br>+123 456 7890</div>
          </div>
          <div class="info-row">
            <i class="fas fa-envelope"></i>
            <div><strong>Email</strong><br>contact@ikea.com</div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="col-md-6" data-aos="fade-left">
        <div class="contact-form-card">
          <form id="contactForm">
            <div class="mb-3">
              <label for="name" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Your Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Your Message</label>
              <textarea class="form-control" id="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
          </form>

          <!-- Success Message -->
          <div class="message-container" id="successMessage">
            <p class="mb-0"><strong>Information sent!</strong> We will contact you soon.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- Footer -->
<footer class="footer mt-5">
  <div class="container text-center">
    <p class="fw-bold">© 2025 IKEA. All Rights Reserved.</p>
    <div class="social-icons">
      <a href="https://www.linkedin.com" class="icons1"><i class='bx bxl-linkedin'></i></a>
      <a href="https://www.twitter.com" class="icons1"><i class='bx bxl-twitter'></i></a>
      <a href="https://www.instagram.com" class="icons1"><i class="bx bxl-instagram"></i></a>
      <a href="https://www.facebook.com" class="icons1"><i class="bx bxl-facebook"></i></a>
    </div>
  </div>
</footer>

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Initialize AOS (Animate On Scroll) with customized settings
    AOS.init({
      duration: 900,
      easing: 'ease-in-out',
      once: true
    });

    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault(); // Preventing default form submission

      // Simulating sending an email (you can use a real server-side email service later)
      const email = document.getElementById("email").value;
      console.log(`Sending message to: abc@xyz.com (User Email: ${email})`);

      // Showing the success message after form submission
      const successMessage = document.getElementById("successMessage");
      successMessage.style.display = "block";

      // Optionally, reset the form after submission
      document.getElementById("contactForm").reset();
    });
  </script>

</body>
</html>
